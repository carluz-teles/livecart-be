services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: livecart
      POSTGRES_PASSWORD: livecart
      POSTGRES_DB: livecart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livecart"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-server
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use Docker network hostname
      DATABASE_URL: postgres://livecart:livecart@postgres:5432/livecart?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack:/var/lib/localstack

  tunnel:
    image: node:20-alpine
    command: >
      sh -c "npm install -g localtunnel &&
             echo '🚀 Starting tunnel to https://livecart-api.loca.lt' &&
             lt --port 3001 --subdomain livecart-api --local-host api"
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - dev

volumes:
  pgdata:
  localstack:
