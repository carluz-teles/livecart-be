services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: livecart
      POSTGRES_PASSWORD: livecart
      POSTGRES_DB: livecart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livecart"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://livecart:livecart@postgres:5432/livecart?sslmode=disable
      APP_ENV: development
      PORT: "3001"
      CLERK_FRONTEND_API: ${CLERK_FRONTEND_API:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack:/var/lib/localstack

volumes:
  pgdata:
  localstack:
