version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema: "db/migrations/"
    gen:
      go:
        package: "sqlc"
        out: "db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "json"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "json"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "pg_catalog.jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "pg_catalog.jsonb"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "pg_catalog.json"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "pg_catalog.json"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
