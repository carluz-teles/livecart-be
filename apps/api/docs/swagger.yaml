host: localhost:3001
info:
  contact:
    email: support@livecart.com
    name: LiveCart Support
  description: API REST for LiveCart SaaS — live commerce order detection, cart consolidation,
    and integrations.
  license:
    name: Proprietary
  termsOfService: https://livecart.com/terms
  title: LiveCart API
  version: "1.0"
paths:
  /api/v1/invitations/accept:
    post:
      consumes:
      - application/json
      description: Accepts an invitation and adds the user to the store
      parameters:
      - description: Invitation token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apps_api_internal_invitation.AcceptInvitationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/apps_api_internal_invitation.AcceptInvitationOutput'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
      security:
      - BearerAuth: []
      summary: Accept invitation
      tags:
      - invitations
  /api/v1/invitations/token/{token}:
    get:
      description: Returns invitation details for the accept page (public endpoint)
      parameters:
      - description: Invitation token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/apps_api_internal_invitation.InvitationDetailsResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
      summary: Get invitation by token
      tags:
      - invitations
  /api/v1/stores:
    post:
      consumes:
      - application/json
      description: Creates a new store with owner membership
      parameters:
      - description: Store creation payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apps_api_internal_store.CreateStoreRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/apps_api_internal_store.CreateStoreResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.ValidationEnvelope'
      security:
      - BearerAuth: []
      summary: Create a new store
      tags:
      - stores
  /api/v1/stores/{storeId}:
    put:
      consumes:
      - application/json
      description: Updates a specific store (requires store access)
      parameters:
      - description: Store UUID
        in: path
        name: storeId
        required: true
        type: string
      - description: Store update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/apps_api_internal_store.UpdateStoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/apps_api_internal_store.StoreResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/livecart_apps_api_lib_httpx.Envelope'
        "403":
          description: Forbidden
          schema:
